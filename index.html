<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painopisteen Ennustin</title>

<link rel="stylesheet" href="style.css">

<script>
const API_BASE = "https://script.google.com/macros/s/AKfycbyR6Dj6c0J0hHe-6g0ZMnTRgJAtyPTw_Viug-pEzcZmuJ8HVFQ5U1vpwl-RoSkXXHoB/exec";
</script>

<script src="app.js" defer></script>
</head>

<body>

<!-- ================= ALOITUS ================= -->
<div id="startView" class="start-view">

  <div class="start-card">

    <img src="Iconi_500x300-removebg-preview.png" class="start-logo" alt="Logo">

    <div class="start-title">
      Painopisteen Ennustin
      <span class="start-version">v<span id="appVersion"></span></span>
    </div>

    <div class="start-actions">
      <button onclick="avaaUusiLennokki()">+</button>
      <button onclick="avaaLennokki()">›</button>
      <button onclick="kopioiValittuLennokki()">⧉</button>
      <button onclick="muokkaaValittuaLennokkia()">✏️</button>
      <button onclick="poistaValittuLennokki()">−</button>
      <button onclick="avaaOhje()">?</button>
    </div>

    <div class="start-table-wrapper">
      <table class="start-table">
        <thead>
          <tr>
            <th>Lennokki</th>
            <th>Paino</th>
            <th>Pp</th>
            <th>Pvm</th>
          </tr>
        </thead>
        <tbody id="startTableBody"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- ================= SOVELLUS ================= -->
<div id="appView" style="display:none;">
  <div class="app">

    <header class="topbar">

    <div class="left">
      <div class="titlebar">
        <strong class="title">
          Painopisteen Ennustin v<span id="appVersion2"></span>
        </strong>
      </div>
  
      <div class="nav">
        <button class="back-btn" onclick="palaaAloitukseen()">‹</button>
        <button class="active" onclick="naytaOsat()">#</button>
        <button id="suodatusBtn" onclick="vaihdaSuodatus()">Ø</button>      
        <button id="tallennaBtn" onclick="tallenna()">√</button>
        <button onclick="naytaYhteenveto()">Ʃ</button>
        <button class="help-btn" onclick="avaaOhje()">?</button>
      </div>
    </div>
  
    <div class="right">
      <select id="lennokkiSelect"
              onchange="vaihdaLennokki(this.value)">
      </select>
    </div>
  </header>
  <div id="osatView"></div>
  <div class="editor-footer">
    <button id="tallennaBtn">Tallenna</button>
  </div>  
  <div id="yhteenvetoView" style="display:none;">
    <div id="yhteenvetoTable"></div>
  </div>
  </div>
</div>
<div id="ohjeModal" class="modal">
  <div class="modal-content">
    <span onclick="suljeOhje()" class="close">&times;</span>
    <div id="ohjeTeksti"></div>
  </div>
</div>
  
</body>
</html>
